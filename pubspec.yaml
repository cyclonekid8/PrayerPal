name: prayerpal
description: Personal Islamic prayer tracker for Singapore Muslims.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.2.4
  sqflite: ^2.3.3
  path: ^1.9.0
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  timezone: ^0.9.4
  permission_handler: ^11.3.1
  cupertino_icons: ^1.0.8
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/prayer_times.json
